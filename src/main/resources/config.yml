#######################################################################
#                              BlockBall                              #
#                             by Shynixn                              #
#######################################################################
# The locale file used for in-game messages, menus, and system prompts.
language: "en_us"

#######################################################################
#                          Command Settings                           #
#######################################################################
# Register optional command aliases to make commands easier for players.
commands:
  blockball:
    aliases:
      - "soccer"
      - "football"
  blockballscoreboard:
    aliases:
      - "soccerscoreboard"
      - "footballscoreboard"
  blockballbossbar:
    aliases:
      - "soccerbossbar"
      - "footballbossbar"
  blockballsign:
    aliases:
      - "soccersign"
  blockballparticles:
    aliases:
      - "soccerparticles"
  blockballclub:
    aliases:
      - "soccerclub"

#######################################################################
#                           Logging Settings                          #
#######################################################################
logging:
  # The minimum log level printed directly to the main server console.
  # Available levels: DEBUG, INFO, WARNING, ERROR
  consoleLevel: "INFO"

  # The minimum log level written to your custom 'BlockBall/logs/' files.
  # Available levels: DEBUG, INFO, WARNING, ERROR
  fileLevel: "ERROR"

  # The maximum size allowed for a single log file (in Megabytes) before
  # a new log file generation is created.
  maxFileSizeMb: 2

  # The maximum number of backup log files to keep in rotation history.
  # Once this limit is reached, the oldest log file is automatically deleted.
  maxFileCount: 4

#######################################################################
#                          Database Settings                          #
#######################################################################
database:
  # Automatically saves modified player data to the storage backend on this interval.
  # Data is also automatically saved when a player disconnects from the server.
  autoSaveIntervalMinutes: 5

  # An artificial delay (in milliseconds) added before executing read requests.
  # Critical for multi-server networks sharing a database to prevent race conditions
  # during fast server switches. Increase in steps (50, 100, 250, 500) if data syncs slowly.
  readDelayMs: 0

  # The storage backend type to use. Supported options: sqlite, mysql
  type: "sqlite"

  # MySQL specific credentials and engine pooling. (Ignored if type is set to 'sqlite')
  jdbc:
    # JDBC Connection String. Replace localhost, 3306, and BlockBall with your specific details.
    url: "jdbc:mysql://localhost:3306/BlockBall"
    # Database authentication username.
    username: ""
    # Database authentication password.
    password: ""
    # Performance properties utilizing HikariCP (https://github.com/brettwooldridge/HikariCP).
    # Tune these connection values based on your network traffic and database hardware.
    properties:
      - "useSSL=true"
      - "maximumPoolSize=5"
      - "cachePrepStmts=true"
      - "prepStmtCacheSize=250"
      - "prepStmtCacheSqlLimit=2048"

#######################################################################
#                         Scoreboard Settings                         #
#######################################################################
scoreboard:
  # How frequently (in seconds) the system re-evaluates player permissions
  # to dynamically add or remove visible scoreboards.
  checkForChangeChangeSeconds: 3

  # The grace period (in seconds) to wait after a player joins the server
  # before fully building and displaying their personal scoreboard.
  joinDelaySeconds: 3

#######################################################################
#                           BossBar Settings                          #
#######################################################################
bossbar:
  # How frequently (in seconds) the system re-evaluates player permissions
  # to dynamically add or remove visible bossbars.
  checkForChangeChangeSeconds: 3

  # The grace period (in seconds) to wait after a player joins the server
  # before fully building and assigning active bossbars.
  joinDelaySeconds: 3

#######################################################################
#                            Sign Settings                            #
#######################################################################
sign:
  # Anti-spam click interval constraint (in server ticks).
  # 20 ticks = 1 second. (30 ticks = 1.5 seconds)
  clickCooldownTicks: 30

#######################################################################
#                  Website/Cloud Logs (Patreon Only)                 #
#######################################################################
# The plugin can send data to https://blockball.shynixn.com.
# This is disabled by default and must be explicitly enabled per game.
cloud:
  # The endpoint where analytics, matches, and server profiles are dispatched.
  # Change this if you have a private white-label site domain.
  publishUrl: "https://blockball.shynixn.com"

  # Toggles whether your unique server identification should be hidden for custom domains.
  hideServerId: false

#######################################################################
#                Leaderboard Placeholders (Patreon Only)              #
#######################################################################
leaderboard:
  # If you do not track active player stats, disable this setting to
  # conserve engine memory footprints and skip scheduled data computation tasks.
  enabled: true

  # How frequently (in minutes) the server queries the database backend
  # to refresh cached records for leaderboard displays.
  intervalMinutes: 15

#######################################################################
#                      Soccer Clubs (Patreon Only)                    #
#######################################################################
club:
  # The grace period (in seconds) to wait after a player joins the server
  # before checking, loading, and parsing their club profile states.
  joinDelaySeconds: 3

  # Network synchronization threshold (in seconds). Cross-server updates
  # require a central connection and type 'mysql' to work correctly.
  synchronizeClubsSeconds: 300

  # Restricts the maximum amount of teams a single player can be affiliated with concurrently.
  maxJoinClubsPerPlayer: 3

  # Restricts the total amount of custom soccer clubs a single player is allowed to manage/create.
  maxCreateClubsPerPlayer: 1

  # Profanity filter matrix. Substrings matching items on this list
  # will block team name registrations and systemic messages.
  blackList:
    - "nigger"
    - "nigga"
    - "fuck"
    - "shit"

  # Structural name boundaries for core registration validation.
  clubNameMinLength: 3
  clubNameMaxLength: 16

  # Structural name boundaries for visual formats (includes raw colors and space padding).
  clubDisplayNameMinLength: 3
  clubDisplayNameMaxLength: 32

  # Limits the maximum amount of pending, unaccepted club invitations a player
  # can have open at any single given time.
  clubMaxInvites: 5